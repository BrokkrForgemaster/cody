<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Forged Customs</title>
  <desc id="desc">Transparent Forged Customs metallic FC logo with red accent and built different finished right tagline.</desc>
  <defs>
    <linearGradient id="steel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f7f7"/>
      <stop offset="0.18" stop-color="#858585"/>
      <stop offset="0.52" stop-color="#242424"/>
      <stop offset="0.78" stop-color="#b7b7b7"/>
      <stop offset="1" stop-color="#343434"/>
    </linearGradient>
    <linearGradient id="redSteel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff3a3a"/>
      <stop offset="0.34" stop-color="#c1121f"/>
      <stop offset="0.68" stop-color="#5d0409"/>
      <stop offset="1" stop-color="#e51b25"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" x2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.48" stop-color="#5c5c5c"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-35%" width="140%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="9" flood-color="#000000" flood-opacity="0.78"/>
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#c1121f" flood-opacity="0.22"/>
    </filter>
    <pattern id="scratches" width="34" height="34" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
      <path d="M2 8h22M9 18h18M0 29h30" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
      <path d="M6 3h16M11 24h13" stroke="#000000" stroke-opacity="0.22" stroke-width="1"/>
    </pattern>
    <style>
      .mark,
      .word {
        font-family: Impact, "Arial Black", "Bebas Neue", sans-serif;
        font-style: italic;
        font-weight: 900;
      }
      .wide {
        font-family: "Arial Narrow", Impact, sans-serif;
        font-weight: 700;
        letter-spacing: 28px;
      }
      .tag {
        font-family: "Arial Narrow", Arial, sans-serif;
        font-weight: 700;
        letter-spacing: 18px;
      }
    </style>
  </defs>
  <g filter="url(#softShadow)">
    <text class="mark" x="236" y="232" font-size="232" fill="#060606" stroke="#030303" stroke-width="20">F</text>
    <text class="mark" x="236" y="220" font-size="232" fill="url(#steel)" stroke="url(#edge)" stroke-width="3">F</text>
    <text class="mark" x="236" y="220" font-size="232" fill="url(#scratches)" opacity="0.95">F</text>
    <text class="mark" x="486" y="232" font-size="232" fill="#060606" stroke="#030303" stroke-width="20">C</text>
    <text class="mark" x="486" y="220" font-size="232" fill="url(#redSteel)" stroke="#ffeded" stroke-width="3">C</text>
    <text class="mark" x="486" y="220" font-size="232" fill="url(#scratches)" opacity="0.76">C</text>
  </g>
  <g filter="url(#softShadow)">
    <text class="word" x="124" y="375" font-size="154" fill="#060606" stroke="#030303" stroke-width="14">FORGED</text>
    <text class="word" x="124" y="364" font-size="154" fill="url(#steel)" stroke="url(#edge)" stroke-width="2.5">FORGED</text>
    <text class="word" x="124" y="364" font-size="154" fill="url(#scratches)" opacity="0.84">FORGED</text>
  </g>
  <path d="M105 427h130" stroke="#c1121f" stroke-width="5"/>
  <path d="M965 427h130" stroke="#c1121f" stroke-width="5"/>
  <text class="wide" x="274" y="443" font-size="54" fill="url(#redSteel)" stroke="#ff3030" stroke-width="1.2">CUSTOMS</text>
  <text class="tag" x="198" y="512" font-size="28" fill="url(#steel)">BUILT DIFFERENT. FINISHED RIGHT.</text>
  <path d="M600 526l-24-28 24 13 24-13z" fill="#c1121f" stroke="#ff3030" stroke-width="1.5"/>
</svg>
